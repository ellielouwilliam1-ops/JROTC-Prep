function fmt(d) { return d.toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
function daysUntil(t) { const n = new Date(); n.setHours(0,0,0,0); return Math.ceil((t - n) / DAY_MS); }

function getSlotDate(mi, wi, dn) {
  return addDays(PROGRAM_START, (mi*4 + wi)*7 + DAY_NAMES.indexOf(dn));
}

function getTodayPos() {
  const t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((t - PROGRAM_START) / DAY_MS);
  if (diff < 0 || diff >= 168) return null;
  const tw = Math.floor(diff / 7);
  return { mi: Math.min(Math.floor(tw/4),5), wi: Math.min(tw%4,3), dn: DAY_NAMES[diff%7] };

    { days:{ MON:{ label:"Upper Body", tasks:[{id:"3v1",text:"4 sets of 28 push-ups",cat:"pushup"},{id:"3v2",text:"7 pull-ups × 4 sets",cat:"pullup"}]},
      TUE:{ label:"Easy Run", tasks:[{id:"3w1",text:"Run 2.25 miles easy",cat:"run"}]},
      WED:{ label:"Push-ups + Core", tasks:[{id:"3x1",text:"4 sets of 28 push-ups",cat:"pushup"},{id:"3x2",text:"75 crunches, 90-sec plank, 30 leg raises × 2",cat:"core"}]},
      THU:{ label:"Intervals", tasks:[{id:"3y1",text:"400m hard × 7, walk 200m between",cat:"run"}]},
      FRI:{ label:"Full Upper", tasks:[{id:"3z1",text:"Max push-up test — write it down",cat:"pushup"},{id:"3z2",text:"7 pull-ups × 5 sets",cat:"pullup"}]},
      SAT:{ label:"🎯 First Mile", tasks:[{id:"3aa1",text:"Run 1 full mile without stopping 🎯",cat:"run"},{id:"3aa2",text:"Record your time",cat:"run"}]},
      SUN:{ label:"Rest", tasks:[{id:"3bb1",text:"Rest, stretch, hydrate",cat:"recovery"}]}}},
  ]},
  { num:4, name:"Push Further", tag:"Mile is consistent. Build to 2 miles. Pull-ups growing.", weeks:
    [0,1,2,3].map(wi=>({ days:{ MON:{ label:"Upper Body", tasks:[{id:`4a${wi}`,text:`4 sets of ${28+wi*3} push-ups`,cat:"pushup"},{id:`4b${wi}`,text:`${7+wi} pull-ups × 4 sets`,cat:"pullup"}]},
      TUE:{ label:"Easy Run", tasks:[{id:`4c${wi}`,text:`Run ${1.5+wi*0.25} miles at comfortable pace`,cat:"run"}]},
      WED:{ label:"Push-ups + Core", tasks:[{id:`4d${wi}`,text:`4 sets of ${28+wi*3} push-ups`,cat:"pushup"},{id:`4e${wi}`,text:"70 crunches, 90-sec plank, 30 leg raises × 2",cat:"core"}]},
      THU:{ label:"Intervals", tasks:[{id:`4f${wi}`,text:"400m hard × 6, or ladder 200/400/600/400/200",cat:"run"}]},
      FRI:{ label:"Full Upper", tasks:[{id:`4g${wi}`,text:"Max push-up test",cat:"pushup"},{id:`4h${wi}`,text:`${8+wi} pull-ups × 5 sets`,cat:"pullup"}]},
      SAT:{ label:"Long Run", tasks:[{id:`4i${wi}`,text:`Run ${1.75+wi*0.25} miles — no walk breaks`,cat:"run"}]},
      SUN:{ label:"Rest", tasks:[{id:`4j${wi}`,text:"Rest, stretch, hydrate",cat:"recovery"}]}}}))
  },
  { num:5, name:"Race Prep", tag:"3-mile is the target. Push-ups 40+. Pull-ups 10+.", weeks:
    [0,1,2,3].map(wi=>({ days:{ MON:{ label:"Upper Body", tasks:[{id:`5a${wi}`,text:`4 sets of ${35+wi*3} push-ups`,cat:"pushup"},{id:`5b${wi}`,text:`${10+wi} pull-ups × 4 sets`,cat:"pullup"}]},
      TUE:{ label:"Race Pace", tasks:[{id:`5c${wi}`,text:`${1.5+wi*0.5} miles at goal 8:00/mi pace`,cat:"run"}]},
      WED:{ label:"Push-ups + Core", tasks:[{id:`5d${wi}`,text:`4 sets of ${35+wi*3} push-ups`,cat:"pushup"},{id:`5e${wi}`,text:"80 crunches, 90-sec plank × 2",cat:"core"}]},
      THU:{ label:"Intervals", tasks:[{id:`5f${wi}`,text:"800m hard, 400m walk — repeat 4×",cat:"run"}]},
      FRI:{ label:"Full Upper", tasks:[{id:`5g${wi}`,text:"Max push-up + pull-up test",cat:"pushup"}]},
      SAT:{ label: wi===3?"🎯 3-Mile Benchmark":"Long Run", tasks: wi===3?[{id:"5bench",text:"Timed 3-mile run — record your time 🎯",cat:"run"}]:[{id:`5h${wi}`,text:`Run ${2+wi*0.35} miles`,cat:"run"}]},
      SUN:{ label:"Rest", tasks:[{id:`5i${wi}`,text:"Rest, stretch, hydrate",cat:"recovery"}]}}}))
  },
  { num:6, name:"Peak", tag:"Mock PFT week 4. Sub-24:00. 15 pull-ups.", weeks:
    [0,1,2,3].map(wi=>({ days:{ MON:{ label:"Upper Body", tasks:[{id:`6a${wi}`,text:"4 sets of 40+ push-ups",cat:"pushup"},{id:`6b${wi}`,text:"12–15 pull-ups × 4 sets",cat:"pullup"}]},
      TUE:{ label:"Run", tasks:[{id:`6c${wi}`,text:wi<2?"3 miles at 8:00/mi pace":wi===2?"2 miles easy (taper)":"1.5 miles easy (PFT week)",cat:"run"}]},
      WED:{ label:"Push-ups + Core", tasks:[{id:`6d${wi}`,text:"4 sets of 40+ push-ups",cat:"pushup"},{id:`6e${wi}`,text:"80+ crunches, 2-min plank × 2",cat:"core"}]},
      THU:{ label:"Run", tasks:[{id:`6f${wi}`,text:wi<2?"800m repeats × 4":"Easy 20 min jog",cat:"run"}]},
      FRI:{ label:"Upper", tasks:[{id:`6g${wi}`,text:wi===3?"Light flush — 2 sets push-ups only":"Max push-up + pull-up test",cat:"pushup"}]},
      SAT:{ label: wi===3?"🎖️ MOCK PFT":"Long Run", tasks: wi===3?[
        {id:"pft1",text:"Pull-ups to failure — record reps",cat:"pullup"},
        {id:"pft2",text:"Rest 5 minutes",cat:"recovery"},
        {id:"pft3",text:"Crunches — max in 2 minutes, record reps",cat:"core"},
        {id:"pft4",text:"Rest 5 minutes",cat:"recovery"},
        {id:"pft5",text:"3-mile timed run — goal: sub-24:00 🎖️",cat:"run"},
      ]:[{id:`6h${wi}`,text:`Run ${2.5+wi*0.25} miles`,cat:"run"}]},
      SUN:{ label:"Rest", tasks:[{id:`6i${wi}`,text:"Rest, stretch, hydrate",cat:"recovery"}]}}}))
  },
];

const HABITS = [
  {id:"wake",text:"Woke up at set time",group:"morning"},
  {id:"bed",text:"Made bed immediately",group:"morning"},
  {id:"face-am",text:"Washed face (morning)",group:"morning"},
  {id:"teeth-am",text:"Brushed teeth (morning)",group:"morning"},
  {id:"water",text:"Drank water first thing",group:"morning"},
  {id:"nophone",text:"No phone first 30 min",group:"morning"},
  {id:"face-pm",text:"Washed face (evening)",group:"evening"},
  {id:"teeth-pm",text:"Brushed teeth (evening)",group:"evening"},
  {id:"gear",text:"Laid out tomorrow's gear",group:"evening"},
  {id:"log",text:"Wrote 3-line daily log",group:"evening"},
  {id:"phonedown",text:"Phone down 45 min before bed",group:"evening"},
  {id:"sleep",text:"In bed by target time",group:"evening"},
];

const CAT_COLOR = {run:"#1a5c35",pushup:"#7a1a1a",pullup:"#1a3568",core:"#4a3a10",recovery:"#252525"};
const CAT_LABEL = {run:"RUN",pushup:"PUSH",pullup:"PULL",core:"CORE",recovery:"REST"};

// ── STATE ─────────────────────────────────────────────────────
const todayPos = getTodayPos();
let state = {
  mi: todayPos ? todayPos.mi : 0,
  wi: todayPos ? todayPos.wi : 0,
  dn: todayPos ? todayPos.dn : "MON",
  view: "today",
  done: {},
  habits: {},
};

function save() {
  try { localStorage.setItem("jrotc_done", JSON.stringify(state.done)); localStorage.setItem("jrotc_habits", JSON.stringify(state.habits)); } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem("jrotc_done"); if(d) state.done = JSON.parse(d);
    const h = localStorage.getItem("jrotc_habits"); if(h) state.habits = JSON.parse(h);
  } catch(e){}
}

load();

// ── HELPERS ───────────────────────────────────────────────────
function taskKey(mi, wi, tid) { return `${mi}-${wi}-${tid}`; }
function today() { const t = new Date(); t.setHours(0,0,0,0); return t; }
function todayKey() { return today().toISOString().split("T")[0]; }
function habitKey(hid) { return `${todayKey()}-${hid}`; }

function getDayData() {
  const m = MONTHS[state.mi];
  const w = m && m.weeks[state.wi];
  return w && w.days[state.dn];
}

function getDayStats(mi, wi, dn) {
  const m = MONTHS[mi]; const w = m && m.weeks[wi]; const d = w && w.days[dn];
  if (!d) return {n:0,tot:0};
  const tot = d.tasks.length;
  const n = d.tasks.filter(t => state.done[taskKey(mi,wi,t.id)]).length;
  return {n, tot};
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  renderHeader();
  renderNav();
  renderView();
}

function renderHeader() {
  const du = daysUntil(JROTC_START);
  const cdEl = document.getElementById("countdown-label");
  if (du > 0) { cdEl.textContent = `${du}d until JROTC`; cdEl.className = "countdown mono" + (du <= 14 ? " soon" : ""); }
  else if (du === 0) { cdEl.textContent = "🎖️ JROTC TODAY"; cdEl.className = "countdown mono soon"; }
  else { cdEl.textContent = "JROTC STARTED"; cdEl.className = "countdown mono"; }
  document.getElementById("pos-label").textContent = `Aug 7 · M${state.mi+1} W${state.wi+1}`;

  const pb = document.getElementById("progress-bar");
  pb.innerHTML = "";
  MONTHS.forEach((_,i) => {
    const s = document.createElement("div");
    s.className = "prog-seg" + (i < state.mi ? " past" : i === state.mi ? " current" : "");
    pb.appendChild(s);
  });
}

function renderNav() {
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(`.nav-btn[onclick="setView('${state.view}')"]`).classList.add("active");
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(`view-${state.view}`).classList.add("active");
}

function renderView() {
  if (state.view === "today") renderToday();
  else if (state.view === "habits") renderHabits();
  else renderPlan();
}

function renderToday() {
  const el = document.getElementById("view-today");
  const m = MONTHS[state.mi];
  const todayDate = today();

  // Month selectors
  let html = `<div class="selectors">`;
  MONTHS.forEach((mo,i) => {
    html += `<button class="sel-btn mono${state.mi===i?" active":""}" onclick="selectMonth(${i})">M${mo.num}</button>`;
  });
  html += `</div>`;

  // Week selectors
  html += `<div class="selectors">`;
  m.weeks.forEach((_,i) => {
    html += `<button class="sel-btn week mono${state.wi===i?" active":""}" onclick="selectWeek(${i})">W${i+1}</button>`;
  });
  html += `</div>`;

  // Day tabs
  html += `<div id="day-tabs">`;
  DAY_NAMES.forEach(dn => {
    const {n,tot} = getDayStats(state.mi, state.wi, dn);
    const full = n===tot && tot>0;
    const slotDate = getSlotDate(state.mi, state.wi, dn);
    const isToday = slotDate.toDateString() === todayDate.toDateString();
    const active = state.dn === dn;
    let cls = "day-tab";
    if (active) cls += " active";
    else if (isToday) cls += " today-tab";
    else if (full) cls += " complete";
    html += `<div class="${cls}" onclick="selectDay('${dn}')">
      <div class="dt-name mono">${dn}</div>
      <div class="dt-date mono">${fmt(slotDate)}</div>
      <div class="dt-prog mono">${full?"✓":tot>0?`${n}/${tot}`:"—"}</div>
    </div>`;
  });
  html += `</div>`;

  const dayData = getDayData();
  if (!dayData) { el.innerHTML = html + `<div style="text-align:center;padding:40px;color:#333;font-size:12px">No data</div>`; return; }

  const tasks = dayData.tasks;
  const done = tasks.filter(t => state.done[taskKey(state.mi,state.wi,t.id)]).length;
  const pct = Math.round((done/tasks.length)*100);
  const allDone = done === tasks.length;
  const selDate = getSlotDate(state.mi, state.wi, state.dn);

  const ringColor = allDone ? "#4a8a4a" : "#7a1a1a";
  html += `<div id="day-header">
    <div>
      <div id="day-label">${dayData.label}</div>
      <div id="day-sub" class="mono">${state.dn} ${fmt(selDate).toUpperCase()} · ${m.name.toUpperCase()} W${state.wi+1}</div>
    </div>
    <div id="day-ring" style="background:conic-gradient(${ringColor} ${pct*3.6}deg,#1a1a1a 0deg)">
      <div id="day-ring-inner" style="color:${allDone?"#4a8a4a":"#e0dbd0"}" class="mono">${pct}%</div>
    </div>
  </div>`;

  tasks.forEach(t => {
    const k = taskKey(state.mi, state.wi, t.id);
    const isDone = !!state.done[k];
    html += `<div class="task-item${isDone?" done":""}" onclick="toggleTask('${k}')">
      <div class="task-cb${isDone?" checked":""}">${isDone?"✓":""}</div>
      <span class="task-text">${t.text}</span>
      <span class="task-cat mono" style="background:${CAT_COLOR[t.cat]}33;color:${CAT_COLOR[t.cat]}">${CAT_LABEL[t.cat]}</span>
    </div>`;
  });

  if (allDone) {
    html += `<div style="text-align:center;padding:20px;margin-top:6px;background:#091309;border:1px solid #1c3a1c;border-radius:3px">
      <div style="font-size:22px">🎖️</div>
      <div style="font-size:9px;color:#4a8a4a;letter-spacing:3px;margin-top:4px" class="mono">DAY COMPLETE — SEMPER FI</div>
    </div>`;
  }

  el.innerHTML = html;
}

function renderHabits() {
  const el = document.getElementById("view-habits");
  const doneCount = HABITS.filter(h => state.habits[habitKey(h.id)]).length;
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:9px;letter-spacing:3px;color:#7a1a1a" class="mono">TODAY'S HABITS</div>
    <div style="font-size:10px;color:${doneCount===HABITS.length?"#4a8a4a":"#666"}" class="mono">${doneCount}/${HABITS.length}</div>
  </div>`;

  ["morning","evening"].forEach(grp => {
    html += `<div style="margin-bottom:20px">
      <div class="habit-group-label mono">${grp==="morning"?"🌅 MORNING":"🌙 EVENING"}</div>`;
    HABITS.filter(h=>h.group===grp).forEach(h => {
      const k = habitKey(h.id);
      const isDone = !!state.habits[k];
      html += `<div class="habit-item${isDone?" done":""}" onclick="toggleHabit('${k}')">
        <div class="task-cb${isDone?" checked":""}">${isDone?"✓":""}</div>
        <span class="habit-text">${h.text}</span>
      </div>`;
    });
    html += `</div>`;
  });

  html += `<button class="reset-btn mono" onclick="resetHabits()">RESET FOR TODAY</button>`;
  el.innerHTML = html;
}

function renderPlan() {
  const el = document.getElementById("view-plan");
  const du = daysUntil(JROTC_START);
  let html = `<div style="font-size:9px;letter-spacing:3px;color:#7a1a1a;margin-bottom:14px" class="mono">6-MONTH OVERVIEW</div>`;

  MONTHS.forEach((m,i) => {
    const sd = getSlotDate(i,0,"MON"), ed = getSlotDate(i,3,"SUN");
    html += `<div class="plan-item${state.mi===i?" active":""}" onclick="selectMonth(${i});setView('today')">
      <div class="plan-row">
        <div style="display:flex;gap:12px;align-items:baseline">
          <span class="plan-num mono">0${m.num}</span>
          <div><div class="plan-name">${m.name}</div><div class="plan-tag">${m.tag}</div></div>
        </div>
        <div class="plan-dates mono">${fmt(sd)}<br>↓<br>${fmt(ed)}</div>
      </div>
    </div>`;
  });

  html += `<div class="jrotc-tile">
    <div><div class="jrotc-title">🎖️ JROTC Begins</div><div class="jrotc-sub">August 7, 2026 — Day One</div></div>
    <div class="jrotc-days mono">${du}d</div>
  </div>`;

  html += `<div class="start-table">
    <div style="font-size:9px;letter-spacing:3px;color:#7a1a1a;margin-bottom:10px" class="mono">STARTING POINT</div>
    ${[["Running","Run/walk intervals — can barely do a mile"],["Push-ups","3 perfect reps (resetting form)"],["Pull-ups","Building from zero with negatives"],["6-mo goal","Sub-24:00 3-mi · 15 pull-ups · 40+ push-ups"]].map(([k,v])=>`
    <div class="start-row"><span class="start-key mono">${k}</span><span class="start-val">${v}</span></div>`).join("")}
  </div>`;

  el.innerHTML = html;
}

// ── ACTIONS ───────────────────────────────────────────────────
function setView(v) { state.view = v; render(); }
function selectMonth(i) { state.mi = i; state.wi = 0; render(); }
function selectWeek(i) { state.wi = i; render(); }
function selectDay(dn) { state.dn = dn; render(); }

function toggleTask(k) {
  state.done[k] = !state.done[k];
  save(); renderToday();
}

function toggleHabit(k) {
  state.habits[k] = !state.habits[k];
  save(); renderHabits();
}

function resetHabits() {
  const tk = todayKey();
  HABITS.forEach(h => { delete state.habits[`${tk}-${h.id}`]; });
  save(); renderHabits();
}

// ── INIT ──────────────────────────────────────────────────────
render();
</script>
</body>
</html>
